<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGA — Sistema Integrado de Gestão Aceitar</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a3a5c'/%3E%3Ctext x='50' y='62' font-family='Segoe UI,sans-serif' font-size='36' font-weight='700' text-anchor='middle' fill='%23c9a24a'%3EA%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --navy: #1a3a5c;
      --navy-light: #234969;
      --navy-dark: #0f2642;
      --gold: #c9a24a;
      --gold-light: #e0bc6b;
      --gold-dark: #a88236;
      --bg: #f7f2e8;
      --bg-muted: #efe8d8;
      --card-bg: #ffffff;
      --border: #d9d0bd;
      --border-light: #e8e0cc;
      --text: #2a2a2a;
      --text-muted: #6b6b6b;
      --text-soft: #8a8a8a;
      --success: #2e7d4a;
      --success-bg: #e8f5ec;
      --warning: #d97706;
      --warning-bg: #fef3e2;
      --danger: #b91c1c;
      --danger-bg: #fdecec;
      --info: #2563eb;
      --info-bg: #e8efff;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
      --radius: 6px;
      --radius-lg: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, system-ui, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
      min-height: 100vh;
    }

    button { font-family: inherit; cursor: pointer; }
    input, select, textarea { font-family: inherit; font-size: 14px; }
    a { color: inherit; text-decoration: none; }

    /* ========== LOGIN ========== */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
    }
    .login-card {
      background: var(--card-bg);
      padding: 40px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: 2px;
    }
    .login-logo .tagline {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .login-logo .accent {
      width: 40px;
      height: 3px;
      background: var(--gold);
      margin: 12px auto;
    }

    /* ========== FORMS ========== */
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .form-group label .required { color: var(--danger); }
    .form-control {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card-bg);
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201, 162, 74, 0.15);
    }
    textarea.form-control { resize: vertical; min-height: 80px; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 700px) {
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
    }

    /* ========== BUTTONS ========== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
      white-space: nowrap;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--navy);
      color: white;
      border-color: var(--navy);
    }
    .btn-primary:hover { background: var(--navy-light); }
    .btn-gold {
      background: var(--gold);
      color: white;
      border-color: var(--gold);
    }
    .btn-gold:hover { background: var(--gold-dark); }
    .btn-secondary {
      background: var(--card-bg);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-secondary:hover { background: var(--bg-muted); }
    .btn-danger {
      background: var(--danger);
      color: white;
      border-color: var(--danger);
    }
    .btn-danger:hover { background: #8b1616; }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      padding: 6px 10px;
    }
    .btn-ghost:hover { color: var(--text); background: var(--bg-muted); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-lg { padding: 12px 20px; font-size: 14px; }
    .btn-block { width: 100%; justify-content: center; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ========== APP SHELL ========== */
    #app { display: none; }
    #app.active { display: block; }

    /* Navbar */
    .navbar {
      background: var(--navy);
      color: white;
      border-bottom: 3px solid var(--gold);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .navbar-inner {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 56px;
    }
    .navbar-brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 1.5px;
    }
    .navbar-brand .dot {
      color: var(--gold);
      font-size: 22px;
      line-height: 0;
    }
    .navbar-brand .subtitle {
      font-size: 10px;
      font-weight: 400;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .navbar-links {
      display: flex;
      gap: 2px;
    }
    .nav-link {
      padding: 8px 14px;
      border-radius: var(--radius);
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      background: transparent;
    }
    .nav-link:hover {
      background: var(--navy-light);
      color: white;
    }
    .nav-link.active {
      background: var(--gold);
      color: var(--navy-dark);
      font-weight: 600;
    }
    .navbar-user {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
    }
    .user-badge {
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .user-badge.superadmin { background: var(--gold); color: var(--navy-dark); }
    .user-badge.leitor { background: rgba(255,255,255,0.15); color: white; }

    /* Main content */
    .main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Page header */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .page-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ========== CARDS / KPIs ========== */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: var(--card-bg);
      padding: 18px 20px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
    }
    .kpi-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .kpi-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--navy);
    }
    .kpi-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ========== CARD SECTION ========== */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--navy);
    }
    .card-body { padding: 20px; }

    /* ========== FILTER BAR ========== */
    .filter-bar {
      display: flex;
      gap: 10px;
      padding: 12px 20px;
      background: var(--bg-muted);
      border-bottom: 1px solid var(--border-light);
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar .form-control {
      max-width: 220px;
      min-width: 140px;
    }
    .filter-bar .search {
      flex: 1;
      min-width: 200px;
      max-width: 340px;
    }

    /* ========== TABLE ========== */
    .table-wrapper {
      overflow-x: auto;
    }
    table.data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .data-table thead th {
      text-align: left;
      padding: 10px 14px;
      background: var(--bg-muted);
      color: var(--navy);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      border-bottom: 2px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .data-table thead th:hover { background: var(--border-light); }
    .data-table thead th.sort-asc::after { content: " ▲"; color: var(--gold); }
    .data-table thead th.sort-desc::after { content: " ▼"; color: var(--gold); }
    .data-table tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-light);
      vertical-align: middle;
    }
    .data-table tbody tr:hover { background: var(--bg); }
    .data-table tbody tr.clickable { cursor: pointer; }
    .data-table .actions {
      display: flex;
      gap: 4px;
      justify-content: flex-end;
    }
    .data-table .empty-row td {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-style: italic;
    }
    .num { text-align: right; font-variant-numeric: tabular-nums; }

    /* ========== STATUS BADGES ========== */
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .badge-pendente { background: #fef3c7; color: #92400e; }
    .badge-preparacao { background: #dbeafe; color: #1e40af; }
    .badge-submetido { background: #e0e7ff; color: #3730a3; }
    .badge-enviada { background: #e0e7ff; color: #3730a3; }
    .badge-adjudicado { background: var(--success-bg); color: var(--success); }
    .badge-aceite { background: var(--success-bg); color: var(--success); }
    .badge-naoadjudicado { background: var(--danger-bg); color: var(--danger); }
    .badge-rejeitada { background: var(--danger-bg); color: var(--danger); }
    .badge-execucao { background: #fff3e0; color: #b85c00; }
    .badge-concluida { background: #e8f5ec; color: var(--success); }
    .badge-cancelada,
    .badge-cancelado { background: #f1f5f9; color: #475569; }

    /* ========== MODALS ========== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 38, 66, 0.6);
      z-index: 200;
      padding: 24px;
      overflow-y: auto;
    }
    .modal-overlay.active {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .modal {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 720px;
      max-height: calc(100vh - 48px);
      overflow-y: auto;
      margin: auto;
    }
    .modal.modal-sm { max-width: 440px; }
    .modal.modal-lg { max-width: 960px; }
    .modal-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--navy);
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 22px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 24px; }
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border-light);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      background: var(--bg-muted);
    }

    /* ========== UTILS ========== */
    .flex { display: flex; }
    .gap-sm { gap: 8px; }
    .gap { gap: 16px; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .flex-wrap { flex-wrap: wrap; }
    .mt-sm { margin-top: 8px; }
    .mt { margin-top: 16px; }
    .mb-sm { margin-bottom: 8px; }
    .mb { margin-bottom: 16px; }
    .mb-lg { margin-bottom: 24px; }
    .hidden { display: none !important; }
    .text-muted { color: var(--text-muted); }
    .text-small { font-size: 12px; }
    .text-center { text-align: center; }

    /* Toast */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--navy);
      color: white;
      padding: 12px 16px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      font-size: 13px;
      min-width: 240px;
      max-width: 400px;
      animation: slide-in 0.2s;
    }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    @keyframes slide-in {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Analysis IA panel */
    .ia-panel {
      background: linear-gradient(135deg, #faf6ed 0%, #f5efdd 100%);
      border: 1px solid var(--gold-light);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .ia-panel h4 {
      color: var(--navy);
      font-size: 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ia-panel h4::before { content: "✨"; }
    .ia-content {
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .ia-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border-light);
    }
    .ia-loading {
      display: flex;
      gap: 4px;
      align-items: center;
      color: var(--text-muted);
      font-size: 13px;
    }
    .ia-loading .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Placeholder screens */
    .placeholder {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .placeholder h3 {
      color: var(--navy);
      font-size: 20px;
      margin-bottom: 8px;
    }
    .placeholder p {
      max-width: 500px;
      margin: 0 auto 16px;
    }
    .placeholder .icon {
      font-size: 48px;
      opacity: 0.4;
      margin-bottom: 16px;
    }

    /* Mobile nav */
    @media (max-width: 900px) {
      .navbar-inner { flex-wrap: wrap; gap: 8px; min-height: auto; padding: 10px 16px; }
      .navbar-links { order: 3; width: 100%; overflow-x: auto; }
      .main { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- ========== LOGIN ========== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <h1>SIGA</h1>
      <div class="accent"></div>
      <div class="tagline">Sistema Integrado de Gestão Aceitar</div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" class="form-control" placeholder="nome@aceitar.pt" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" class="form-control" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div id="login-error" class="text-small" style="color: var(--danger); margin-bottom: 12px; min-height: 16px;"></div>
    <button id="login-btn" class="btn btn-primary btn-block btn-lg">Entrar</button>
    <div class="text-small text-muted text-center mt">
      Acesso restrito a utilizadores Aceitar
    </div>
  </div>
</div>

<!-- ========== APP ========== -->
<div id="app">
  <nav class="navbar">
    <div class="navbar-inner">
      <div class="navbar-brand">
        <span>SIGA</span>
        <span class="dot">●</span>
        <span class="subtitle">Sist. Integrado Gestão Aceitar</span>
      </div>
      <div class="navbar-links" id="navbar-links">
        <button class="nav-link active" data-section="dashboard">Dashboard</button>
        <button class="nav-link" data-section="concursos">Concursos</button>
        <button class="nav-link" data-section="inspect">Aceitar Inspect</button>
        <button class="nav-link" data-section="afetacoes">Afetações</button>
        <button class="nav-link" data-section="frota">Frota</button>
        <button class="nav-link" data-section="equipamentos">Equipamentos</button>
        <button class="nav-link" data-section="comunicacoes">Comunicações</button>
      </div>
      <div class="navbar-user">
        <span id="user-name"></span>
        <span id="user-badge" class="user-badge"></span>
        <button class="btn btn-ghost btn-sm" style="color: rgba(255,255,255,0.8)" id="logout-btn">Sair</button>
      </div>
    </div>
  </nav>

  <main class="main">
    <!-- Sections injected here -->
    <section id="section-dashboard" class="section"></section>
    <section id="section-concursos" class="section hidden"></section>
    <section id="section-inspect" class="section hidden"></section>
    <section id="section-afetacoes" class="section hidden"></section>
    <section id="section-frota" class="section hidden"></section>
    <section id="section-equipamentos" class="section hidden"></section>
    <section id="section-comunicacoes" class="section hidden"></section>
  </main>
</div>

<!-- ========== MODAL CONTAINER ========== -->
<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this) closeModal()">
  <div id="modal" class="modal" onclick="event.stopPropagation()"></div>
</div>

<input type="file" id="xlsx-file-input" accept=".xlsx,.xls" style="display:none">

// ---------- UTILS ----------
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function fmtCurrency(v) {
  if (v === null || v === undefined || v === '') return '—';
  const n = Number(v);
  if (isNaN(n)) return '—';
  return n.toLocaleString('pt-PT', {
    style: 'currency', currency: 'EUR',
    minimumFractionDigits: 2, maximumFractionDigits: 2
  });
}

function fmtDate(v) {
  if (!v) return '—';
  const d = new Date(v);
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleDateString('pt-PT');
}

function fmtDateTime(v) {
  if (!v) return '—';
  const d = new Date(v);
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleString('pt-PT');
}

function daysUntil(v) {
  if (!v) return null;
  const d = new Date(v);
  const today = new Date();
  today.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function badge(value) {
  if (!value) return '';
  const key = value.toLowerCase()
    .replace(/á/g,'a').replace(/ã/g,'a').replace(/ç/g,'c')
    .replace(/ó/g,'o').replace(/é/g,'e').replace(/í/g,'i').replace(/ú/g,'u')
    .replace(/\s+/g,'');
  return `<span class="badge badge-${key}">${escapeHtml(value)}</span>`;
}

function showToast(msg, type = '') {
  const container = $('#toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function showModal(html, size = '') {
  const modal = $('#modal');
  modal.className = 'modal' + (size ? ' modal-' + size : '');
  modal.innerHTML = html;
  $('#modal-overlay').classList.add('active');

function closeModal() {

// ---------- AUTH ----------
async function checkAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return false;

  const { data: userRow, error } = await sb
    .from('siga_users')
    .select('*')
    .eq('email', session.user.email)
    .maybeSingle();

  if (error || !userRow || !userRow.ativo) {
    await sb.auth.signOut();
    return false;
  }

  state.user = session.user;
  state.userRole = userRow.papel;
  state.userName = userRow.nome || session.user.email;
  return true;
}

async function login() {
  const email = $('#login-email').value.trim();
  const password = $('#login-password').value;
  const errEl = $('#login-error');
  const btn = $('#login-btn');

  if (!email || !password) {
    errEl.textContent = 'Introduz email e password.';
    return;
  }
  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'A entrar...';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errEl.textContent = 'Credenciais inválidas.';
    btn.disabled = false;
    btn.textContent = 'Entrar';
    return;
  }

  const ok = await checkAuth();
  if (!ok) {
    errEl.textContent = 'Utilizador inativo ou sem permissões.';
    btn.disabled = false;
    btn.textContent = 'Entrar';
    return;
  }

  await startApp();
}

  location.reload();

// ---------- SORT / FILTER ----------
function sortRows(rows, key, dir) {
  return [...rows].sort((a, b) => {
    let va = a[key], vb = b[key];
    if (va === null || va === undefined) va = '';
    if (vb === null || vb === undefined) vb = '';
    if (typeof va === 'number' && typeof vb === 'number') return dir === 'asc' ? va - vb : vb - va;
    if (/^\d{4}-\d{2}-\d{2}/.test(va) || va instanceof Date) {
      const da = new Date(va).getTime() || 0;
      const db = new Date(vb).getTime() || 0;
      return dir === 'asc' ? da - db : db - da;
    }
    return dir === 'asc'
      ? String(va).localeCompare(String(vb), 'pt')
      : String(vb).localeCompare(String(va), 'pt');
  });
}

function applyFilters(rows, filters, searchFields) {
  return rows.filter(r => {
    if (filters.status && r.status !== filters.status) return false;
    if (filters.estado && r.estado !== filters.estado) return false;
    if (filters.search) {
      const q = filters.search.toLowerCase();
      const match = searchFields.some(f => {
        const v = r[f];
        return v && String(v).toLowerCase().includes(q);
      });
      if (!match) return false;
    }
    return true;
  });
}

// ---------- XLSX IMPORT/EXPORT ----------
function exportXLSX(rows, fields, filename) {
  const data = rows.map(r => {
    const out = {};
    fields.forEach(f => { out[f.label] = f.format ? f.format(r[f.key]) : r[f.key]; });
    return out;
  });
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Dados');
  XLSX.writeFile(wb, filename);
  showToast('Exportado ' + rows.length + ' registos', 'success');
}

async function importXLSX(table, mapRow) {
  return new Promise(resolve => {
    const inp = $('#xlsx-file-input');
    inp.value = '';
    inp.onchange = async () => {
      const file = inp.files[0];
      if (!file) { resolve(false); return; }
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: null });
      const mapped = rows.map(mapRow).filter(Boolean);
      if (!mapped.length) {
        showToast('Nenhum registo válido no ficheiro', 'error');
        resolve(false); return;
      }
      const { error } = await sb.from(table).insert(mapped);
      if (error) {
        showToast('Erro: ' + error.message, 'error');
        resolve(false); return;
      }
      showToast('Importados ' + mapped.length + ' registos', 'success');
      resolve(true);
    };
    inp.click();
  });
}

// ---------- AI ANALYSIS ----------
async function analyzeRecord(type, record) {
  try {
    const resp = await fetch('/api/analisar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, record })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    return data.analysis;
  } catch (e) {
    console.error(e);
    throw new Error('Falhou a análise IA: ' + e.message);
  }
}

async function saveConcurso(id) {
  const form = $('#form-concurso');
  const fd = new FormData(form);
  const rec = {};
  fd.forEach((v, k) => { rec[k] = v === '' ? null : v; });
  if (rec.valor_base) rec.valor_base = parseFloat(rec.valor_base);

  let error;
  if (id) {
    ({ error } = await sb.from('concursos').update(rec).eq('id', id));
  } else {
    rec.criado_por = null;
    ({ error } = await sb.from('concursos').insert(rec));
  }
  if (error) { showToast('Erro: ' + error.message, 'error'); return; }
  closeModal();
  await reloadTable('concursos');
  renderConcursos();
  showToast(id ? 'Concurso atualizado' : 'Concurso criado', 'success');
}

function deleteConcurso(id) {
  const r = state.data.concursos.find(x => x.id === id);
  confirmAction('Eliminar o concurso "' + (r?.nome || '—') + '"?', async () => {
    const { error } = await sb.from('concursos').delete().eq('id', id);
    if (error) { showToast('Erro: ' + error.message, 'error'); return; }
    await reloadTable('concursos');
    renderConcursos();
    showToast('Concurso eliminado', 'success');

}

async function runAnalysisConcurso(id) {

      </div>

        <h3>${title}</h3>
        <p>${message}</p>
        <p class="text-small">Estrutura de base de dados já criada. Campos e UI a detalhar na próxima iteração.</p>
      </div>
    </div>
  `;
}

// ============================================================
// INIT
// ============================================================
async function startApp() {
  $('#login-screen').style.display = 'none';
  $('#app').classList.add('active');
  $('#user-name').textContent = state.userName;
  const badge = $('#user-badge');
  badge.textContent = state.userRole;
  badge.className = 'user-badge ' + state.userRole;

  await loadAll();
  navigate('dashboard');
}

$$('.nav-link').forEach(btn => {
  btn.onclick = () => navigate(btn.dataset.section);
});
$('#logout-btn').onclick = logout;
$('#login-btn').onclick = login;
$('#login-password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
$('#login-email').addEventListener('keydown', e => { if (e.key === 'Enter') $('#login-password').focus(); });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Boot
(async () => {
  const ok = await checkAuth();
  if (ok) await startApp();
})();

</script>

</body>
</html>
