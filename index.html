<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGA — Sistema Integrado de Gestão Aceitar</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a3a5c'/%3E%3Ctext x='50' y='62' font-family='Segoe UI,sans-serif' font-size='36' font-weight='700' text-anchor='middle' fill='%23c9a24a'%3EA%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <style>
    :root {
      --navy: #1a3a5c;
      --navy-light: #234969;
      --navy-dark: #0f2642;
      --gold: #c9a24a;
      --gold-light: #e0bc6b;
      --gold-dark: #a88236;
      --bg: #f7f2e8;
      --bg-muted: #efe8d8;
      --card-bg: #ffffff;
      --border: #d9d0bd;
      --border-light: #e8e0cc;
      --text: #2a2a2a;
      --text-muted: #6b6b6b;
      --text-soft: #8a8a8a;
      --success: #2e7d4a;
      --success-bg: #e8f5ec;
      --warning: #d97706;
      --warning-bg: #fef3e2;
      --danger: #b91c1c;
      --danger-bg: #fdecec;
      --info: #2563eb;
      --info-bg: #e8efff;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
      --radius: 6px;
      --radius-lg: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, system-ui, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
      min-height: 100vh;
    }

    button { font-family: inherit; cursor: pointer; }
    input, select, textarea { font-family: inherit; font-size: 14px; }
    a { color: inherit; text-decoration: none; }

    /* ========== LOGIN ========== */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
    }
    .login-card {
      background: var(--card-bg);
      padding: 40px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: 2px;
    }
    .login-logo .tagline {
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .login-logo .accent {
      width: 40px;
      height: 3px;
      background: var(--gold);
      margin: 12px auto;
    }

    /* ========== FORMS ========== */
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .form-group label .required { color: var(--danger); }
    .form-control {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card-bg);
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201, 162, 74, 0.15);
    }
    textarea.form-control { resize: vertical; min-height: 80px; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 700px) {
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
    }

    /* ========== BUTTONS ========== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      transition: all 0.15s;
      white-space: nowrap;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--navy);
      color: white;
      border-color: var(--navy);
    }
    .btn-primary:hover { background: var(--navy-light); }
    .btn-gold {
      background: var(--gold);
      color: white;
      border-color: var(--gold);
    }
    .btn-gold:hover { background: var(--gold-dark); }
    .btn-secondary {
      background: var(--card-bg);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-secondary:hover { background: var(--bg-muted); }
    .btn-danger {
      background: var(--danger);
      color: white;
      border-color: var(--danger);
    }
    .btn-danger:hover { background: #8b1616; }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      padding: 6px 10px;
    }
    .btn-ghost:hover { color: var(--text); background: var(--bg-muted); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-lg { padding: 12px 20px; font-size: 14px; }
    .btn-block { width: 100%; justify-content: center; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ========== APP SHELL ========== */
    #app { display: none; }
    #app.active { display: block; }

    /* Navbar */
    .navbar {
      background: var(--navy);
      color: white;
      border-bottom: 3px solid var(--gold);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .navbar-inner {
      max-width: 1600px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 56px;
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 1.5px;
    }
    .navbar-brand .dot {
      color: var(--gold);
      font-size: 22px;
      line-height: 0;
    }
    .navbar-brand .brand-meta {
      display: flex;
      flex-direction: column;
      gap: 1px;
      line-height: 1.1;
    }
    .navbar-brand .subtitle {
      font-size: 10px;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .navbar-links {
      display: flex;
      gap: 2px;
    }
    .nav-link {
      padding: 8px 14px;
      border-radius: var(--radius);
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      background: transparent;
    }
    .nav-link:hover {
      background: var(--navy-light);
      color: white;
    }
    .nav-link.active {
      background: var(--gold);
      color: var(--navy-dark);
      font-weight: 600;
    }
    .navbar-user {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
    }
    .user-badge {
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .user-badge.superadmin { background: var(--gold); color: var(--navy-dark); }
    .user-badge.leitor { background: rgba(255,255,255,0.15); color: white; }
    .app-version {
      font-size: 10px;
      color: var(--gold-light);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.3px;
      font-weight: 600;
    }
    .btn-outline {
      background: transparent;
      color: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .btn-outline:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.5);
    }

    /* Main content */
    .main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Page header */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .page-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ========== CARDS / KPIs ========== */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: var(--card-bg);
      padding: 18px 20px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
    }
    .kpi-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .kpi-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--navy);
    }
    .kpi-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ========== CARD SECTION ========== */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--navy);
    }
    .card-body { padding: 20px; }

    /* ========== FILTER BAR ========== */
    .filter-bar {
      display: flex;
      gap: 10px;
      padding: 12px 20px;
      background: var(--bg-muted);
      border-bottom: 1px solid var(--border-light);
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar .form-control {
      max-width: 220px;
      min-width: 140px;
    }
    .filter-bar .search {
      flex: 1;
      min-width: 200px;
      max-width: 340px;
    }

    /* ========== TABLE ========== */
    .table-wrapper {
      overflow-x: auto;
    }
    table.data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .data-table thead th {
      text-align: left;
      padding: 10px 14px;
      background: var(--bg-muted);
      color: var(--navy);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      border-bottom: 2px solid var(--border);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .data-table thead th:hover { background: var(--border-light); }
    .data-table thead th.sort-asc::after { content: " ▲"; color: var(--gold); }
    .data-table thead th.sort-desc::after { content: " ▼"; color: var(--gold); }
    .data-table tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-light);
      vertical-align: middle;
    }
    .data-table tbody tr:hover { background: var(--bg); }
    .data-table tbody tr.clickable { cursor: pointer; }
    .data-table .actions {
      display: flex;
      gap: 4px;
      justify-content: flex-end;
    }
    .data-table .empty-row td {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-style: italic;
    }
    .num { text-align: right; font-variant-numeric: tabular-nums; }

    /* ========== STATUS BADGES ========== */
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .badge-pendente { background: #fef3c7; color: #92400e; }
    .badge-emaberto { background: #e0f2fe; color: #075985; }
    .badge-preparacao { background: #dbeafe; color: #1e40af; }
    .badge-submetido { background: #e0e7ff; color: #3730a3; }
    .badge-enviada { background: #e0e7ff; color: #3730a3; }
    .badge-adjudicado,
    .badge-adjudicada { background: var(--success-bg); color: var(--success); }
    .badge-aceite { background: var(--success-bg); color: var(--success); }
    .badge-naoadjudicado,
    .badge-naoadjudicada { background: var(--danger-bg); color: var(--danger); }
    .badge-rejeitada { background: var(--danger-bg); color: var(--danger); }
    .badge-execucao { background: #fff3e0; color: #b85c00; }
    .badge-realizada { background: #fff3e0; color: #b85c00; }
    .badge-agendada { background: #fde68a; color: #92400e; }
    .badge-comrelatorio { background: #ede9fe; color: #5b21b6; }
    .badge-concluida { background: #e8f5ec; color: var(--success); }
    .badge-fechada { background: #d1fae5; color: #065f46; }
    .badge-cancelada,
    .badge-cancelado { background: #f1f5f9; color: #475569; }

    /* Workflow stepper */
    .workflow-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 12px 16px;
      background: var(--bg-muted);
      border-radius: var(--radius);
      margin-bottom: 16px;
    }
    .workflow-step {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      background: white;
      color: var(--text-soft);
      border: 1px solid var(--border-light);
      white-space: nowrap;
    }
    .workflow-step.active {
      background: var(--gold);
      color: var(--navy-dark);
      border-color: var(--gold);
    }
    .workflow-step.done {
      background: var(--success);
      color: white;
      border-color: var(--success);
    }
    .workflow-step.cancelled {
      background: var(--danger);
      color: white;
      border-color: var(--danger);
    }
    .workflow-arrow { color: var(--text-soft); font-size: 12px; }
    .workflow-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    /* Anexos */
    .anexo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      margin-bottom: 6px;
      background: white;
    }
    .anexo-item.relatorio {
      background: linear-gradient(90deg, #faf6ed, white);
      border-color: var(--gold-light);
    }
    .anexo-icon { font-size: 20px; }
    .anexo-info { flex: 1; min-width: 0; }
    .anexo-nome { font-weight: 600; font-size: 13px; word-break: break-all; }
    .anexo-meta { font-size: 11px; color: var(--text-muted); }
    .anexo-actions { display: flex; gap: 4px; }

    /* ========== MODALS ========== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 38, 66, 0.6);
      z-index: 200;
      padding: 24px;
      overflow-y: auto;
    }
    .modal-overlay.active {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .modal {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 720px;
      max-height: calc(100vh - 48px);
      overflow-y: auto;
      margin: auto;
    }
    .modal.modal-sm { max-width: 440px; }
    .modal.modal-lg { max-width: 960px; }
    .modal-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--navy);
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 22px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 24px; }
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border-light);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      background: var(--bg-muted);
    }

    /* ========== UTILS ========== */
    .flex { display: flex; }
    .gap-sm { gap: 8px; }
    .gap { gap: 16px; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .flex-wrap { flex-wrap: wrap; }
    .mt-sm { margin-top: 8px; }
    .mt { margin-top: 16px; }
    .mb-sm { margin-bottom: 8px; }
    .mb { margin-bottom: 16px; }
    .mb-lg { margin-bottom: 24px; }
    .hidden { display: none !important; }
    .text-muted { color: var(--text-muted); }
    .text-small { font-size: 12px; }
    .text-center { text-align: center; }

    /* Toast */
    #toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--navy);
      color: white;
      padding: 12px 16px;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      font-size: 13px;
      min-width: 240px;
      max-width: 400px;
      animation: slide-in 0.2s;
    }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    @keyframes slide-in {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Analysis IA panel */
    .ia-panel {
      background: linear-gradient(135deg, #faf6ed 0%, #f5efdd 100%);
      border: 1px solid var(--gold-light);
      border-radius: var(--radius-lg);
      padding: 20px;
    }
    .ia-panel h4 {
      color: var(--navy);
      font-size: 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ia-panel h4::before { content: "✨"; }
    .ia-content {
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .ia-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border-light);
    }
    .ia-loading {
      display: flex;
      gap: 4px;
      align-items: center;
      color: var(--text-muted);
      font-size: 13px;
    }
    .ia-loading .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Placeholder screens */
    .placeholder {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .placeholder h3 {
      color: var(--navy);
      font-size: 20px;
      margin-bottom: 8px;
    }
    .placeholder p {
      max-width: 500px;
      margin: 0 auto 16px;
    }
    .placeholder .icon {
      font-size: 48px;
      opacity: 0.4;
      margin-bottom: 16px;
    }

    /* Tabs */
    .tabs {
      display: inline-flex;
      background: var(--bg-muted);
      border-radius: var(--radius);
      padding: 3px;
      gap: 2px;
    }
    .tab-btn {
      padding: 7px 16px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      border-radius: calc(var(--radius) - 2px);
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      background: var(--navy);
      color: white;
    }

    /* Chart grid */
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 900px) {

// Mapeia nome do ficheiro → path no repositório
function pathForFile(name) {
  // Remove sufixos do tipo " (1)", " (2)" que o browser adiciona em downloads repetidos
  // Ex: "index (3).html" → "index.html", "vercel (1).json" → "vercel.json"
  let clean = name.replace(/\s*\(\d+\)(?=\.[^.]+$)/, '');
  // Ficheiros que vão para subpastas
  if (clean === 'analisar.js') return 'api/analisar.js';
  if (clean.endsWith('.sql')) return 'migrations/' + clean;
  // Resto fica na raiz
  return clean;
}

async function deployToGitHub(input) {
  const file = input.files[0];
  if (!file) return;
  const targetPath = pathForFile(file.name);

  // Proteção: alertar se vai sobrescrever index.html com ficheiro não-HTML
  const text = await file.text();
  if (targetPath === 'index.html' && !text.trim().toLowerCase().startsWith('<!doctype html')) {
    if (!confirm('⚠️ Este ficheiro não parece ser HTML mas vai ser enviado para index.html.\n\nIsto pode partir o site. Continuar?')) {
      input.value = '';
      return;
    }
  }

  const btn = document.getElementById('btn-deploy');
  const origText = btn.innerHTML;
  btn.innerHTML = '⏳ ' + targetPath + '...';
  btn.style.pointerEvents = 'none';
  let token = localStorage.getItem('gh_token');
  if (!token) {
    token = prompt('GitHub Personal Access Token (scope: repo):');
    if (!token) { btn.innerHTML = origText; btn.style.pointerEvents = ''; return; }
    localStorage.setItem('gh_token', token.trim());
  }
  try {
    const bytes = new TextEncoder().encode(text);
    let binary = '';
    const chunkSize = 8192;
    for (let i = 0; i < bytes.length; i += chunkSize) {
      binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
    }
    const encoded = btoa(binary);
    const getResp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${targetPath}`, {
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' }
    });
    const existing = getResp.ok ? await getResp.json() : null;
    const sha = existing?.sha;
    const putResp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${targetPath}`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: `Deploy ${targetPath} — ${new Date().toLocaleString('pt-PT')}`,
        content: encoded,
        ...(sha ? { sha } : {})
      })
    });
    if (!putResp.ok) {
      const err = await putResp.json();
      throw new Error(err.message || 'Erro no deploy');
    }
    btn.innerHTML = '✅ ' + targetPath;
    setTimeout(() => { btn.innerHTML = origText; btn.style.pointerEvents = ''; }, 3000);
  } catch (e) {
    alert('Erro no deploy: ' + e.message);
    localStorage.removeItem('gh_token');
    btn.innerHTML = origText;
    btn.style.pointerEvents = '';
  }
}

const $ = s => document.querySelector(s);

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function fmtCurrency(v) {
  if (v === null || v === undefined || v === '') return '—';
  const n = Number(v);
  if (isNaN(n)) return '—';
  // Formato: 1 000,00 € (separador de milhar com espaço, decimal com vírgula)
  const fixed = n.toFixed(2);
  const [intPart, decPart] = fixed.split('.');
  const intWithSpaces = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  return intWithSpaces + ',' + decPart + ' €';
}

function fmtDate(v) {
  if (!v) return '—';
  const d = new Date(v);
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleDateString('pt-PT');
}

function fmtDateTime(v) {
  if (!v) return '—';
  const d = new Date(v);
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleString('pt-PT');
}

// Aceita Date, string ISO yyyy-mm-dd, ou string pt dd/mm/yyyy (com / ou -).
// Retorna sempre string yyyy-mm-dd ou null.
function parseDateValue(v) {
  if (v === null || v === undefined || v === '') return null;
  if (v instanceof Date && !isNaN(v.getTime())) {
    return v.toISOString().slice(0, 10);
  }
  const s = String(v).trim();
  if (!s) return null;
  // ISO yyyy-mm-dd
  const isoMatch = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (isoMatch) {
    const [, y, m, d] = isoMatch;
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  // PT dd/mm/yyyy ou dd-mm-yyyy
  const ptMatch = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
  if (ptMatch) {
    let [, d, m, y] = ptMatch;
    if (y.length === 2) y = (parseInt(y, 10) >= 50 ? '19' : '20') + y;
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  // Tentar Date.parse genérico
  const parsed = new Date(s);
  if (!isNaN(parsed.getTime())) return parsed.toISOString().slice(0, 10);
  return null;
}

function daysUntil(v) {
  if (!v) return null;
  const d = new Date(v);
  const today = new Date();
  today.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

// ---------- SORT / FILTER ----------
function sortRows(rows, key, dir) {
  return [...rows].sort((a, b) => {
    let va = a[key], vb = b[key];
    if (va === null || va === undefined) va = '';
    if (vb === null || vb === undefined) vb = '';
    if (typeof va === 'number' && typeof vb === 'number') return dir === 'asc' ? va - vb : vb - va;
    if (/^\d{4}-\d{2}-\d{2}/.test(va) || va instanceof Date) {
      const da = new Date(va).getTime() || 0;
      const db = new Date(vb).getTime() || 0;
      return dir === 'asc' ? da - db : db - da;
    }
    return dir === 'asc'
      ? String(va).localeCompare(String(vb), 'pt')
      : String(vb).localeCompare(String(va), 'pt');
  });
}

function applyFilters(rows, filters, searchFields) {
  return rows.filter(r => {
    if (filters.status && r.status !== filters.status) return false;
    if (filters.estado && r.estado !== filters.estado) return false;
    if (filters.search) {
      const q = filters.search.toLowerCase();
      const match = searchFields.some(f => {
        const v = r[f];
        return v && String(v).toLowerCase().includes(q);
      });
      if (!match) return false;
    }
    return true;
  });
}

function exportXLSX(rows, fields, filename) {
  const data = rows.map(r => {
    const out = {};
    fields.forEach(f => { out[f.label] = f.format ? f.format(r[f.key]) : r[f.key]; });
    return out;
  });
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Dados');
  XLSX.writeFile(wb, filename);
  showToast('Exportado ' + rows.length + ' registos', 'success');
}

async function importXLSX(table, mapRow) {
  return new Promise(resolve => {
    const inp = $('#xlsx-file-input');
    inp.value = '';
    inp.onchange = async () => {
      const file = inp.files[0];
      if (!file) { resolve(false); return; }
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: null });
      const mapped = rows.map(mapRow).filter(Boolean);
      if (!mapped.length) {
        showToast('Nenhum registo válido no ficheiro', 'error');
        resolve(false); return;
      }

      // Pergunta modo: adicionar ou substituir
      const mode = await askImportMode(mapped.length);
      if (!mode) { resolve(false); return; }

      if (mode === 'replace') {
        const { error: delErr } = await sb.from(table).delete().not('id', 'is', null);
        if (delErr) {
          showToast('Erro a limpar: ' + delErr.message, 'error');
          resolve(false); return;
        }
      }

      const { error } = await sb.from(table).insert(mapped);
      if (error) {
        showToast('Erro: ' + error.message, 'error');
        resolve(false); return;
      }
      showToast(
        (mode === 'replace' ? 'Substituído por ' : 'Adicionados ') + mapped.length + ' registos',
        'success'
      );
      resolve(true);
    };
    inp.click();
  });
}

function askImportMode(count) {
  return new Promise(resolve => {
    showModal(`
      <div class="modal-header">
        <div class="modal-title">Modo de importação</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <p>O ficheiro tem <strong>${count}</strong> registos válidos.</p>
        <p class="text-small text-muted mb">Como queres importar?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="import-cancel">Cancelar</button>
        <button class="btn btn-secondary" id="import-add">Adicionar aos existentes</button>
        <button class="btn btn-danger" id="import-replace">Substituir tudo</button>
      </div>
    `, 'sm');
    $('#import-cancel').onclick = () => { closeModal(); resolve(null); };
    $('#import-add').onclick = () => { closeModal(); resolve('add'); };
    $('#import-replace').onclick = () => {
      if (confirm('Vai eliminar TODOS os registos atuais antes de importar. Continuar?')) {
        closeModal(); resolve('replace');
      }
    };
  });
}

async function deleteAllRows(table, label, reloadKey) {
  const n = state.data[reloadKey].length;
  if (n === 0) { showToast('Nada para apagar', ''); return; }
  if (!confirm('Vai eliminar TODOS os ' + n + ' registos de ' + label + '. Esta ação é irreversível. Continuar?')) return;
  const confirmText = prompt('Para confirmar, escreve APAGAR em maiúsculas:');
  if (confirmText !== 'APAGAR') { showToast('Cancelado', ''); return; }
  const { error } = await sb.from(table).delete().not('id', 'is', null);
  if (error) { showToast('Erro: ' + error.message, 'error'); return; }
  await reloadTable(reloadKey);
  if (reloadKey === 'concursos') renderConcursos();
  else if (reloadKey === 'inspect') renderInspect();
  showToast('Eliminados ' + n + ' registos', 'success');
}

// ---------- AI ANALYSIS ----------
async function analyzeRecord(type, record) {
  try {
    const resp = await fetch('/api/analisar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, record })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    return data.analysis;
  } catch (e) {
    console.error(e);
    throw new Error('Falhou a análise IA: ' + e.message);
  }
}

async function saveConcurso(id) {
  const form = $('#form-concurso');
  const fd = new FormData(form);
  const rec = {};
  fd.forEach((v, k) => { rec[k] = v === '' ? null : v; });
  if (rec.valor_base) rec.valor_base = parseFloat(rec.valor_base);

  let error;
  if (id) {
    ({ error } = await sb.from('concursos').update(rec).eq('id', id));
  } else {
    rec.criado_por = null;
    ({ error } = await sb.from('concursos').insert(rec));
  }
  if (error) { showToast('Erro: ' + error.message, 'error'); return; }
  closeModal();
  await reloadTable('concursos');
  renderConcursos();
  showToast(id ? 'Concurso atualizado' : 'Concurso criado', 'success');
}

function deleteConcurso(id) {
  const r = state.data.concursos.find(x => x.id === id);
  confirmAction('Eliminar o concurso "' + (r?.nome || '—') + '"?', async () => {
    const { error } = await sb.from('concursos').delete().eq('id', id);
    if (error) { showToast('Erro: ' + error.message, 'error'); return; }
    await reloadTable('concursos');

async function runAnalysisConcurso(id) {
  const r = state.data.concursos.find(x => x.id === id);

  const panel = $('#ia-panel-concurso');
  panel.innerHTML = `<h4>Análise IA</h4><div class="ia-loading"><div class="spinner"></div>A analisar...</div>`;
  try {
    const analysis = await analyzeRecord('concurso', r);
    await sb.from('concursos').update({
      analise_ia: analysis,
      analise_ia_data: new Date().toISOString()
    }).eq('id', id);
    await reloadTable('concursos');
    openConcursoDetail(id);
    showToast('Análise gerada', 'success');
  } catch (e) {
    panel.innerHTML = `<h4>Análise IA</h4><div style="color:var(--danger)">${escapeHtml(e.message)}</div>
      <div class="mt"><button class="btn btn-gold btn-sm" onclick="runAnalysisConcurso('${id}')">Tentar novamente</button></div>`;

}

  const rows = applyFilters(state.data.concursos, state.filters.concursos,
    ['entidade','nome','localizacao','tipo','plataforma']);
  exportXLSX(rows, [
    { key: 'entidade', label: 'Entidade' },
    { key: 'nome', label: 'Nome' },
    { key: 'localizacao', label: 'Localização' },
    { key: 'plataforma', label: 'Plataforma' },
    { key: 'tipo', label: 'Tipo' },
    { key: 'valor_base', label: 'Valor Base (€)' },
    { key: 'duracao', label: 'Duração' },
    { key: 'entrega', label: 'Entrega', format: fmtDate },
    { key: 'status', label: 'Status' },
    { key: 'notas', label: 'Notas' }
  ], 'siga_concursos_' + new Date().toISOString().slice(0,10) + '.xlsx');

async function importConcursos() {
  const ok = await importXLSX('concursos', row => {
    if (!row['Entidade'] && !row['Nome']) return null;
    return {
      entidade: row['Entidade'] || null,
      nome: row['Nome'] || null,
      localizacao: row['Localização'] || row['Localizacao'] || null,
      plataforma: row['Plataforma'] || null,
      tipo: row['Tipo'] || null,
      valor_base: row['Valor Base (€)'] || row['Valor Base'] ? parseFloat(row['Valor Base (€)'] || row['Valor Base']) : null,
      duracao: row['Duração'] || row['Duracao'] || null,
      entrega: parseDateValue(row['Entrega']),
      status: CONFIG.CONCURSO_STATUS.includes(row['Status']) ? row['Status'] : 'Pendente',
      notas: row['Notas'] || null
    };
  });
  if (ok) { await reloadTable('concursos'); renderConcursos(); }
}

function renderInspectAnalise() {
  const data = state.data.inspect;

  // KPIs
  const totalOrcamentado = data.reduce((s, r) => s + (Number(r.valor_sem_iva) || 0), 0);
  const adjudicadosArr = data.filter(r => ['Adjudicada','Agendada','Realizada','Com Relatório','Fechada'].includes(r.estado));
  const valorAdjudicado = adjudicadosArr.reduce((s, r) => s + (Number(r.valor_sem_iva) || 0), 0);
  const pipelineArr = data.filter(r => ['Em Aberto','Pendente','Enviada'].includes(r.estado));
  const valorPipeline = pipelineArr.reduce((s, r) => s + (Number(r.valor_sem_iva) || 0), 0);
  // Taxa de conversão: Adjudicadas / (Adjudicadas + Não Adjudicadas)
  const aceites = adjudicadosArr.length;
  const rejeitadas = data.filter(r => r.estado === 'Não Adjudicada').length;
  const decididas = aceites + rejeitadas;

      <div class="kpi-card">

// ---------- MAP ----------
function initInspectMap() {
  const mapEl = $('#mapa-inspect');
  if (!mapEl) return;

  // Portugal bounds default
  const map = L.map(mapEl).setView([39.5, -8.0], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19
  }).addTo(map);

  state.map = map;

  const withCoords = state.data.inspect.filter(r => r.latitude && r.longitude);
  if (withCoords.length === 0) return;

  const cluster = L.markerClusterGroup();
  withCoords.forEach(r => {
    const marker = L.marker([r.latitude, r.longitude]);
    const popupHTML = `
      <strong>${escapeHtml(r.cliente || '(sem cliente)')}</strong><br>
      ${r.id_pedido ? escapeHtml(r.id_pedido) + '<br>' : ''}
      ${escapeHtml(r.localizacao || r.morada || '')}<br>
      ${fmtCurrency(r.valor_sem_iva)} · ${r.estado || ''}<br>
      <a href="#" onclick="closePopupAndOpenInspect('${r.id}');return false;">Ver detalhes →</a>
    `;
    marker.bindPopup(popupHTML);
    cluster.addLayer(marker);
  });
  map.addLayer(cluster);

  const bounds = L.latLngBounds(withCoords.map(r => [r.latitude, r.longitude]));
  map.fitBounds(bounds, { padding: [30, 30], maxZoom: 13 });
}

function closePopupAndOpenInspect(id) {
  if (state.map) state.map.closePopup();
  openInspectDetail(id);
}

// ---------- GEOCODING (Nominatim) ----------
async function geocodeAddress(query) {
  if (!query || !query.trim()) return null;
  const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=pt&q=' + encodeURIComponent(query);
  try {
    const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!resp.ok) return null;
    const results = await resp.json();
    if (results && results.length > 0) {
      return {
        lat: parseFloat(results[0].lat),
        lon: parseFloat(results[0].lon)
      };
    }
  } catch (e) {
    console.warn('Geocode falhou:', e);
  }
  return null;
}

async function geocodeAllInspect() {
  const pending = state.data.inspect.filter(r =>
    (r.localizacao || r.morada) && (!r.latitude || !r.longitude)
  );
  if (pending.length === 0) {
    showToast('Nada para geocodificar', 'success');
    return;
  }
  if (!confirm('Vai geocodificar ' + pending.length + ' registos. Isto demora ~' + pending.length + ' segundos (limite de 1 pedido/seg do OpenStreetMap). Continuar?')) return;

  showToast('A geocodificar ' + pending.length + ' registos...', '');
  let ok = 0, fail = 0;
  for (const r of pending) {
    const query = [r.morada, r.localizacao].filter(Boolean).join(', ');
    const coords = await geocodeAddress(query);
    if (coords) {
      await sb.from('inspect_pedidos').update({
        latitude: coords.lat,
        longitude: coords.lon,
        geocoded_at: new Date().toISOString()
      }).eq('id', r.id);
      ok++;
    } else {
      fail++;
    }
    // Rate limit Nominatim: max 1 req/sec
    await new Promise(res => setTimeout(res, 1100));
  }
  showToast('Geocodificado: ' + ok + ' ok, ' + fail + ' falhas', 'success');
  await reloadTable('inspect');
  renderInspect();
}

// ---------- AI GLOBAL INSIGHTS ----------
async function runAnalysisInspectGlobal() {
  const panel = $('#ia-insights-inspect');
  panel.innerHTML = `<h4>Insights IA</h4><div class="ia-loading"><div class="spinner"></div>A analisar...</div>`;

  // Agregar dados para enviar ao Claude
  const data = state.data.inspect;
  const totalOrc = data.reduce((s, r) => s + (Number(r.valor_sem_iva) || 0), 0);
  const adjArr = data.filter(r => ['Adjudicada','Agendada','Realizada','Com Relatório','Fechada'].includes(r.estado));
  const valAdj = adjArr.reduce((s, r) => s + (Number(r.valor_sem_iva) || 0), 0);
  const pipeArr = data.filter(r => ['Em Aberto','Pendente','Enviada'].includes(r.estado));
  const valPipe = pipeArr.reduce((s, r) => s + (Number(r.valor_sem_iva) || 0), 0);
  const aceites = adjArr.length;
  const rejeitadas = data.filter(r => r.estado === 'Não Adjudicada').length;
  const decididas = aceites + rejeitadas;
  const taxa = decididas > 0 ? (aceites / decididas * 100) : 0;

  const porEstado = {};
  data.forEach(r => { porEstado[r.estado] = (porEstado[r.estado]||0)+1; });

  const porTipo = {};
  data.forEach(r => {
    const t = r.tipo_servico || '(n/d)';
    porTipo[t] = porTipo[t] || { count: 0, valor: 0 };
    porTipo[t].count++;
    porTipo[t].valor += Number(r.valor_sem_iva) || 0;
  });

  const porCanal = {};
  data.forEach(r => {
    const c = r.canal_origem || '(n/d)';
    porCanal[c] = porCanal[c] || { count: 0, aceites: 0 };
    porCanal[c].count++;
    if (['Adjudicada','Agendada','Realizada','Com Relatório','Fechada'].includes(r.estado)) porCanal[c].aceites++;
  });

  const agregados = {
    total_propostas: data.length,
    total_orcamentado_eur: Math.round(totalOrc),
    valor_adjudicado_eur: Math.round(valAdj),
    valor_pipeline_eur: Math.round(valPipe),
    aceites: aceites, rejeitadas: rejeitadas,
    taxa_conversao_pct: Number(taxa.toFixed(1)),
    ticket_medio_adjudicado_eur: aceites > 0 ? Math.round(valAdj / aceites) : 0,
    por_estado: porEstado,
    por_tipo_servico: porTipo,
    por_canal: porCanal
  };

  try {
    const resp = await fetch('/api/analisar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'inspect_global', record: agregados })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const d = await resp.json();
    panel.innerHTML = `
      <h4>Insights IA</h4>
      <div class="ia-content">${escapeHtml(d.analysis)}</div>
      <div class="ia-meta">Gerada em ${fmtDateTime(new Date().toISOString())}</div>
      <div class="mt"><button class="btn btn-secondary btn-sm" onclick="runAnalysisInspectGlobal()">🔄 Regenerar</button></div>
    `;
  } catch (e) {
    panel.innerHTML = `<h4>Insights IA</h4><div style="color:var(--danger)">${escapeHtml(e.message)}</div>
      <div class="mt"><button class="btn btn-gold btn-sm" onclick="runAnalysisInspectGlobal()">Tentar novamente</button></div>`;
  }
}

async function saveInspect(id) {
  const form = $('#form-inspect');
  const fd = new FormData(form);
  const rec = {};
  fd.forEach((v, k) => { rec[k] = v === '' ? null : v; });
  if (!rec.cliente || !rec.data_pedido) {
    showToast('Cliente e Data Pedido são obrigatórios', 'error');
    return;
  }
  if (rec.valor_sem_iva) rec.valor_sem_iva = parseFloat(rec.valor_sem_iva);
  if (rec.valor_adjudicado) rec.valor_adjudicado = parseFloat(rec.valor_adjudicado);

  // Auto-geocode if editing with changed address or creating new with address
  const existing = id ? state.data.inspect.find(x => x.id === id) : null;
  const addressChanged = !existing ||
    existing.localizacao !== rec.localizacao ||
    existing.morada !== rec.morada;
  const hasAddress = rec.localizacao || rec.morada;

  if (hasAddress && addressChanged) {
    const query = [rec.morada, rec.localizacao].filter(Boolean).join(', ');
    const coords = await geocodeAddress(query);
    if (coords) {
      rec.latitude = coords.lat;
      rec.longitude = coords.lon;
      rec.geocoded_at = new Date().toISOString();
    }
  }

  let error;
  if (id) {
    ({ error } = await sb.from('inspect_pedidos').update(rec).eq('id', id));
  } else {
    rec.criado_por = null;
    if (!rec.data_abertura) rec.data_abertura = rec.data_pedido || new Date().toISOString().slice(0,10);
    if (!rec.estado) rec.estado = 'Em Aberto';
    ({ error } = await sb.from('inspect_pedidos').insert(rec));
  }
  if (error) { showToast('Erro: ' + error.message, 'error'); return; }
  closeModal();
  await reloadTable('inspect');
  renderInspect();
  showToast(id ? 'Pedido atualizado' : 'Pedido criado', 'success');
}

function deleteInspect(id) {
  const r = state.data.inspect.find(x => x.id === id);
  confirmAction('Eliminar o pedido de "' + (r?.cliente || '—') + '"?', async () => {
    const { error } = await sb.from('inspect_pedidos').delete().eq('id', id);
    if (error) { showToast('Erro: ' + error.message, 'error'); return; }
    await reloadTable('inspect');
    renderInspect();
    showToast('Pedido eliminado', 'success');
  });
}

  // Anexos visíveis em: Em Aberto, Pendente, Adjudicada (e Com Relatório para o relatório)
  const podeAnexarGenerico = ['Em Aberto', 'Pendente', 'Enviada', 'Adjudicada'].includes(r.estado);

// ---------- WORKFLOW TRANSITIONS ----------
function openTransitionModal(id, transicao) {
  const today = new Date().toISOString().slice(0,10);

  // Suporte para formato antigo (extra) e novo (extras)
  const extras = transicao.extras || (transicao.extra ? [transicao.extra] : []);

  const extrasHTML = extras.map((ex, i) => {
    if (ex.type === 'file') {
      return `
        <div class="form-group">
          <label>${ex.label}</label>
          <input type="file" class="form-control" id="extra-${i}" style="padding:6px">
          <div class="text-small text-muted" style="margin-top:4px">Opcional. Máx 25 MB.</div>
        </div>`;
    }
    if (ex.type === 'select') {
      const opts = (ex.options || []).map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('');
      return `
        <div class="form-group">
          <label>${ex.label} <span class="required">*</span></label>
          <select class="form-control" id="extra-${i}">
            <option value="">Selecionar...</option>
            ${opts}
          </select>
        </div>`;
    }
    if (ex.type === 'number') {
      // Valor inicial: se tem defaultFrom, usa esse valor do registo
      const initialValue = ex.defaultFrom && state.data.inspect.find(p => p.id === id)?.[ex.defaultFrom];
      const valAttr = (initialValue !== undefined && initialValue !== null) ? `value="${initialValue}"` : '';
      return `
        <div class="form-group">
          <label>${ex.label} <span class="required">*</span></label>
          <input type="number" step="0.01" class="form-control" id="extra-${i}" ${valAttr} placeholder="0,00">
        </div>`;
    }
    if (ex.type === 'textarea') {
      return `
        <div class="form-group">
          <label>${ex.label}</label>
          <textarea class="form-control" id="extra-${i}" rows="3" style="min-height:70px"></textarea>
        </div>`;
    }
    // date (default)
    return `
      <div class="form-group">
        <label>${ex.label} <span class="required">*</span></label>
        <input type="date" class="form-control" id="extra-${i}" value="${today}">
      </div>`;
  }).join('');

  showModal(`
    <div class="modal-header">
      <div class="modal-title">${escapeHtml(transicao.label)}</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <form id="transition-form" onsubmit="event.preventDefault(); return false;">
      <div class="form-group">
        <label>${transicao.dataLabel} <span class="required">*</span></label>
        <input type="date" class="form-control" id="transition-date" value="${today}">
      </div>
      ${extrasHTML}
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn ${transicao.danger ? 'btn-danger' : 'btn-primary'}" id="confirm-transition">Confirmar</button>
    </div>
  `, 'sm');

  $('#confirm-transition').onclick = async () => {
    const dateValue = $('#transition-date').value;
    if (!dateValue) { showToast('Data obrigatória', 'error'); return; }

    const update = {
      estado: transicao.para,
      [transicao.dataField]: dateValue
    };

    // Recolher extras (exceto files, que são tratados separadamente)
    const filesToUpload = [];
    for (let i = 0; i < extras.length; i++) {
      const ex = extras[i];
      const el = $('#extra-' + i);
      if (ex.type === 'file') {
        if (el.files && el.files[0]) {
          if (el.files[0].size > 25 * 1024 * 1024) {
            showToast('Ficheiro demasiado grande (máx 25 MB)', 'error');
            return;
          }
          filesToUpload.push({ field: ex.field, file: el.files[0], label: ex.label, tipoAnexo: ex.tipoAnexo || 'generico' });
        }
        // Se não há ficheiro, apenas não adiciona — é opcional
      } else if (ex.type === 'number') {
        const raw = el.value;
        if (!raw) { showToast(ex.label + ' obrigatório', 'error'); return; }
        update[ex.field] = parseFloat(raw);
      } else if (ex.type === 'textarea') {
        update[ex.field] = el.value || null;
      } else {
        const raw = el.value;
        if (!raw) { showToast(ex.label + ' obrigatória', 'error'); return; }
        update[ex.field] = raw;
      }
    }

    // 1. Atualiza estado/dados na BD
    const btn = $('#confirm-transition');
    btn.disabled = true;
    btn.textContent = 'A guardar...';
    const { error } = await sb.from('inspect_pedidos').update(update).eq('id', id);
    if (error) { showToast('Erro: ' + error.message, 'error'); btn.disabled = false; btn.textContent = 'Confirmar'; return; }

    // 2. Faz upload dos ficheiros
    for (const item of filesToUpload) {
      btn.textContent = 'A enviar ' + item.file.name + '...';
      const path = id + '/' + Date.now() + '_' + item.file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      const { error: upErr } = await sb.storage.from('inspect-anexos').upload(path, item.file, {
        contentType: item.file.type,
        upsert: false
      });
      if (upErr) {
        showToast('Aviso: anexo "' + item.file.name + '" falhou: ' + upErr.message, 'error');
        continue;
      }
      const { error: dbErr } = await sb.from('inspect_anexos').insert({
        pedido_id: id,
        tipo: item.tipoAnexo || 'generico',
        nome: item.file.name,
        storage_path: path,
        tamanho_bytes: item.file.size,
        mime_type: item.file.type
      });
      if (dbErr) {
        await sb.storage.from('inspect-anexos').remove([path]);
        showToast('Aviso: BD do anexo falhou: ' + dbErr.message, 'error');
      }
    }

    closeModal();
    await reloadTable('inspect');
    renderInspect();
    openInspectDetail(id);
    showToast('Estado atualizado para ' + transicao.para, 'success');
  };
}

// ---------- ANEXOS ----------
function fmtBytes(b) {
  if (!b) return '—';
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/1024/1024).toFixed(1) + ' MB';
}

function iconForMime(mime, nome) {
  const ext = (nome || '').split('.').pop().toLowerCase();
  if ((mime || '').startsWith('image/') || ['jpg','jpeg','png','gif','webp'].includes(ext)) return '🖼️';
  if (mime === 'application/pdf' || ext === 'pdf') return '📕';
  if (['doc','docx'].includes(ext)) return '📘';
  if (['xls','xlsx','csv'].includes(ext)) return '📗';
  if (['zip','rar','7z'].includes(ext)) return '🗜️';
  return '📎';
}

function uploadAnexo(propostaId, tipo) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.onchange = async () => {
    const file = inp.files[0];
    if (!file) return;
    if (file.size > 25 * 1024 * 1024) {
      showToast('Ficheiro demasiado grande (máx 25 MB)', 'error');
      return;
    }
    showToast('A carregar ' + file.name + '...', '');
    const ext = file.name.split('.').pop();
    const path = propostaId + '/' + Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_');

    const { error: upErr } = await sb.storage.from('inspect-anexos').upload(path, file, {
      contentType: file.type,
      upsert: false
    });
    if (upErr) { showToast('Erro upload: ' + upErr.message, 'error'); return; }

    const { error: dbErr } = await sb.from('inspect_anexos').insert({
      pedido_id: propostaId,
      tipo: tipo,
      nome: file.name,
      storage_path: path,
      tamanho_bytes: file.size,
      mime_type: file.type
    });
    if (dbErr) {
      await sb.storage.from('inspect-anexos').remove([path]);
      showToast('Erro BD: ' + dbErr.message, 'error');
      return;
    }
    showToast('Anexo carregado', 'success');
    openInspectDetail(propostaId);
  };
  inp.click();
}

async function downloadAnexo(path, nome) {
  const { data, error } = await sb.storage.from('inspect-anexos').createSignedUrl(path, 60);
  if (error) { showToast('Erro: ' + error.message, 'error'); return; }
  const a = document.createElement('a');
  a.href = data.signedUrl;
  a.download = nome;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

function deleteAnexo(anexoId, path, propostaId) {
  confirmAction('Eliminar este anexo?', async () => {
    await sb.storage.from('inspect-anexos').remove([path]);
    const { error } = await sb.from('inspect_anexos').delete().eq('id', anexoId);
    if (error) { showToast('Erro: ' + error.message, 'error'); return; }
    showToast('Anexo eliminado', 'success');
    openInspectDetail(propostaId);
  });
}

async function runAnalysisInspect(id) {
  const r = state.data.inspect.find(x => x.id === id);
  if (!r) return;
  const panel = $('#ia-panel-inspect');
  panel.innerHTML = `<h4>Análise IA</h4><div class="ia-loading"><div class="spinner"></div>A analisar...</div>`;
  try {
    const analysis = await analyzeRecord('inspect', r);
    await sb.from('inspect_pedidos').update({
      analise_ia: analysis,
      analise_ia_data: new Date().toISOString()
    }).eq('id', id);
    await reloadTable('inspect');
    openInspectDetail(id);
    showToast('Análise gerada', 'success');
  } catch (e) {
    panel.innerHTML = `<h4>Análise IA</h4><div style="color:var(--danger)">${escapeHtml(e.message)}</div>
      <div class="mt"><button class="btn btn-gold btn-sm" onclick="runAnalysisInspect('${id}')">Tentar novamente</button></div>`;
  }
}

function exportInspect() {
  const rows = applyFilters(state.data.inspect, state.filters.inspect,
    ['id_pedido','cliente','email','telefone','localizacao','tipo_servico']);
  exportXLSX(rows, [
    { key: 'id_pedido', label: 'ID' },
    { key: 'cliente', label: 'Cliente' },
    { key: 'email', label: 'Email' },
    { key: 'telefone', label: 'Telemóvel' },
    { key: 'localizacao', label: 'Localização' },
    { key: 'morada', label: 'Morada' },
    { key: 'data_pedido', label: 'Data Pedido', format: fmtDate },
    { key: 'tipo_servico', label: 'Tipo de Serviço' },
    { key: 'valor_sem_iva', label: 'Valor s/ IVA (€)' },
    { key: 'estado', label: 'Estado' },
    { key: 'canal_origem', label: 'Canal de Origem' },
    { key: 'notas', label: 'Notas' },
    { key: 'data_envio', label: 'Data de Envio', format: fmtDate },
    { key: 'data_adjudicacao', label: 'Data de Adjudicação', format: fmtDate }
  ], 'siga_inspect_' + new Date().toISOString().slice(0,10) + '.xlsx');
}

async function importInspect() {
  const ok = await importXLSX('inspect_pedidos', row => {
    if (!row['Cliente']) return null;
    return {
      id_pedido: row['ID'] || null,
      cliente: row['Cliente'],
      email: row['Email'] || null,
      telefone: row['Telemóvel'] || row['Telemovel'] || row['Telefone'] || null,
      localizacao: row['Localização'] || row['Localizacao'] || null,
      morada: row['Morada'] || row['Morada Completa'] || null,
      data_pedido: parseDateValue(row['Data Pedido'] || row['Data da Proposta'] || row['Pedido']) || new Date().toISOString().slice(0,10),
      tipo_servico: row['Tipo de Serviço'] || row['Tipo de Servico'] || null,
      valor_sem_iva: row['Valor s/ IVA (€)'] || row['Valor s/ IVA'] ? parseFloat(row['Valor s/ IVA (€)'] || row['Valor s/ IVA']) : null,
      estado: CONFIG.INSPECT_ESTADOS.includes(row['Estado']) ? row['Estado'] : 'Em Aberto',
      canal_origem: row['Canal de Origem'] || null,
      notas: row['Notas'] || null,
      data_envio: parseDateValue(row['Data de Envio']),
      data_adjudicacao: parseDateValue(row['Data de Adjudicação'] || row['Data de Adjudicacao'])
    };
  });
  if (ok) { await reloadTable('inspect'); renderInspect(); }
}
